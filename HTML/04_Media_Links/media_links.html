<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo: Mídia e Links</title>
</head>
<body>
    <!-- Links -->
    <a href="https://www.link.com">Esse é um link</a>
    <br>
     
    <!-- Imagens -->
    <img src="https://picsum.photos/200" alt="Descrição da imagem" width="largura" height="altura">
    <!-- src pode ser uma URL ou um caminho local para a imagem, mas é melhor usar imagens locais -->
    <br>
</body>
</html>
