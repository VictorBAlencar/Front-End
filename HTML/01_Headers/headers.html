<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estudo: Headers</title>
</head>
<body>
    <!-- Headers-->
    <h1>Heading H1</h1> <!-- Somente um por página -->
    <h2>Heading H2</h2>
    <h3>Heading H3</h3>
    <h4>Heading H4</h4>
    <h5>Heading H5</h5>
    <h6>Heading H6</h6>

    <!-- Parágrafos -->
    <p>Este é um parágrafo.</p>
    <p>Outro parágrafo</p>
    <p>Esse é <br> um parágrafo com quebra de linha.</p>
    <p title="Título do parágrafo">Este é um parágrafo com título.</p>
    <hr> <!-- Linha horizontal -->
</body>
</html>
