<!DOCTYPE html>
<html lang="pt-br"> <!-- Idioma do documento -->
<head>
    <meta charset="UTF-8"> <!-- Codificação de caracteres -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsividade para dispositivos móveis -->
    <title>Título do Documento</title> <!-- Aparece na aba do navegador -->
</head>
<body>

    <!-- Headers-->
    <h1>Heading H1</h1>
    <h2>Heading H2</h2>
    <h3>Heading H3</h3>
    <h4>Heading H4</h4>
    <h5>Heading H5</h5>
    <h6>Heading H6</h6>

    <!-- Parágrafos -->
    <p>Este é um parágrafo.</p>
    <p>Outro parágrafo</p>
    <p>Esse é <br> um parágrafo com quebra de linha.</p>
    <p title="Título do parágrafo">Este é um parágrafo com título.</p>
    <p style="color:blue">Este é um parágrafo com cor azul.</p>

    <!-- Links -->
    <a href="https://www.link.com">Esse é um link</a>
    <br>
     

    <!-- Imagens -->
    <img src="https://picsum.photos/200" alt="Descrição da imagem" width="largura" height="altura">
    <!-- src pode ser uma URL ou um caminho local para a imagem, mas é melhor usar imagens locais -->
     
</body>
</html>
